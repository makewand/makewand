name: Bug report
description: Report a reproducible problem
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue clearly.
      placeholder: What is broken?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: makewand version
      description: Output of `makewand --version`
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04 / macOS 15 / Windows 11
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Which usage mode were you using?
      options:
        - fast
        - balanced
        - power
        - unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs, stack traces, or screenshots.
