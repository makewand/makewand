name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reject local absolute doc links
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t markdown_files < <(find README.md docs .github -type f \( -name '*.md' -o -name '*.markdown' \))
          if [ "${#markdown_files[@]}" -eq 0 ]; then
            exit 0
          fi
          if grep --line-number --fixed-strings '/mnt/data/makewand' "${markdown_files[@]}"; then
            echo "found local absolute links; use repository-relative markdown links instead" >&2
            exit 1
          fi

      - name: Check shell script syntax
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in scripts/*.sh; do
            bash -n "${f}"
          done

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting (gofmt)
        shell: bash
        run: |
          set -euo pipefail
          gofiles="$(git ls-files '*.go')"
          if [ -z "${gofiles}" ]; then
            exit 0
          fi
          unformatted="$(gofmt -l ${gofiles})"
          if [ -n "${unformatted}" ]; then
            echo "The following files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build CLI
        run: go build -trimpath -o build/makewand ./cmd/makewand

      - name: Print version
        run: ./build/makewand --version
