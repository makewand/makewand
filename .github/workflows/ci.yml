name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reject local absolute doc links
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t markdown_files < <(find README.md docs .github -type f \( -name '*.md' -o -name '*.markdown' \))
          if [ "${#markdown_files[@]}" -eq 0 ]; then
            exit 0
          fi
          if grep --line-number --fixed-strings '/mnt/data/makewand' "${markdown_files[@]}"; then
            echo "found local absolute links; use repository-relative markdown links instead" >&2
            exit 1
          fi

      - name: Check shell script syntax
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in scripts/*.sh; do
            bash -n "${f}"
          done

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install E2E dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y expect

      - name: Check formatting (gofmt)
        shell: bash
        run: |
          set -euo pipefail
          gofiles="$(git ls-files '*.go')"
          if [ -z "${gofiles}" ]; then
            exit 0
          fi
          unformatted="$(gofmt -l ${gofiles})"
          if [ -n "${unformatted}" ]; then
            echo "The following files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run tests
        run: bash ./scripts/test_gate.sh

      - name: Run race tests
        # scripts/test_race.sh is the single source of truth for race
        # coverage; it derives its package list from `go list ./...` so the
        # concurrency-heavy router and server* packages are always included.
        run: bash ./scripts/test_race.sh

      - name: Run vet
        run: go vet ./cmd/... ./internal/... ./router

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin the linter version so `latest` can't silently drift and break CI
          # again (a v2 bump against a v1 config is what wedged this pipeline).
          version: v2.12.2
          # Gate only issues introduced by the change, not the pre-existing debt
          # in the codebase. New code is still linted; the historical backlog is
          # tracked separately rather than blocking every PR.
          only-new-issues: true

      - name: Build CLI
        run: go build -trimpath -o build/makewand ./cmd/makewand

      - name: Print version
        run: ./build/makewand --version
