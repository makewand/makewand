name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting (gofmt)
        shell: bash
        run: |
          set -euo pipefail
          gofiles="$(git ls-files '*.go')"
          if [ -z "${gofiles}" ]; then
            exit 0
          fi
          unformatted="$(gofmt -l ${gofiles})"
          if [ -n "${unformatted}" ]; then
            echo "The following files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build CLI
        run: go build -trimpath -o build/makewand ./cmd/makewand

      - name: Print version
        run: ./build/makewand --version
