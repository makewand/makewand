name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    env:
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
      SCOOP_BUCKET_REPO: ${{ vars.SCOOP_BUCKET_REPO }}
      PACKAGE_REPO_TOKEN: ${{ secrets.PACKAGE_REPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NO_V="${VERSION#v}"
          mkdir -p dist

          build_one() {
            local goos="$1"
            local goarch="$2"
            local ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            local bin="makewand${ext}"
            local base="makewand_${VERSION}_${goos}_${goarch}"
            local outdir="dist/${base}"
            mkdir -p "${outdir}"

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION_NO_V}" \
              -o "${outdir}/${bin}" ./cmd/makewand

            if [ "$goos" = "windows" ]; then
              (cd dist && zip -q -r "${base}.zip" "${base}")
            else
              (cd dist && tar -czf "${base}.tar.gz" "${base}")
            fi
          }

          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64
          build_one windows amd64

          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Generate Homebrew/Scoop manifests
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/gen_package_manifests.sh "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" dist/checksums.txt dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          PREV_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "${VERSION}" | head -n 1 || true)"

          {
            echo "## Highlights"
            if [ -n "${PREV_TAG}" ]; then
              git log --pretty='- %s (%h)' "${PREV_TAG}..${VERSION}" | sed -n '1,40p'
            else
              git log --pretty='- %s (%h)' -n 20 | sed -n '1,40p'
            fi
            echo
            echo "## Install"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${REPO}/master/scripts/install.sh | bash"
            echo '```'
            echo
            echo "## Verify download integrity"
            echo '```bash'
            echo 'sha256sum -c checksums.txt'
            echo '```'
            echo
            echo "## Verify checksum signature (cosign keyless)"
            echo '```bash'
            echo "cosign verify-blob \\"
            echo "  --certificate checksums.txt.pem \\"
            echo "  --signature checksums.txt.sig \\"
            echo "  --certificate-identity-regexp 'https://github.com/${REPO}/.github/workflows/release.yml@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
            echo "  checksums.txt"
            echo '```'
            echo
            if [ -n "${PREV_TAG}" ]; then
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${VERSION}"
            else
              echo "**Full Changelog**: https://github.com/${REPO}/commits/${VERSION}"
            fi
          } > dist/release-notes.md

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/homebrew/Formula/makewand.rb
            dist/scoop/makewand.json
          body_path: dist/release-notes.md
          fail_on_unmatched_files: true

      - name: Publish Homebrew tap (optional)
        if: ${{ env.PACKAGE_REPO_TOKEN != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ env.PACKAGE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          tap_repo="${HOMEBREW_TAP_REPO:-makewand/homebrew-makewand}"
          ./scripts/publish_homebrew_tap.sh "${tap_repo}" dist/homebrew/Formula/makewand.rb "${GITHUB_REF_NAME}"

      - name: Publish Scoop bucket (optional)
        if: ${{ env.PACKAGE_REPO_TOKEN != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ env.PACKAGE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          bucket_repo="${SCOOP_BUCKET_REPO:-makewand/scoop-makewand}"
          ./scripts/publish_scoop_bucket.sh "${bucket_repo}" dist/scoop/makewand.json "${GITHUB_REF_NAME}"
